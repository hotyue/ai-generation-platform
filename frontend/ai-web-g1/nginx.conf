server {
    listen 80;
    server_name _;

    # 前端静态文件目录
    root /usr/share/nginx/html;
    index index.html;

    # =========================
    # SPA history 路由支持（核心修复）
    # =========================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # =========================
    # 静态资源缓存（已验证方案）
    # =========================
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }
}
