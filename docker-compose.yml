version: "3.9"

services:
  db:
    container_name: aiweb-db
    image: mariadb:11
    restart: always
    environment:
      # 读取 .env 里的密码来初始化 MariaDB
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
    volumes:
      # ==========================================
      # ⭐ 动态数据层：挂载到 /opt/docker 保证数据永不丢失
      # ==========================================
      - /opt/docker/mariadb/data:/var/lib/mysql
      # ==========================================
      # ⭐ 静态代码层：挂载初始化脚本。MariaDB 首次启动时会自动读取并建表
      # ==========================================
      - ./db/schemas/mariadb_v1.0.36_baseline.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - proxy

  backend:
    container_name: aiweb-backend
    build:
      context: ./backend
    image: aiweb-backend:latest
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    environment:
      ENV: production
      DEBUG: "false"
      PYTHONUNBUFFERED: "1"
      # ⭐ 核心修缮：在 compose 层自动组装 MariaDB 连接串
      DATABASE_URL: mysql+pymysql://root:${DB_PASSWORD}@db:3306/${DB_NAME}
      HISTORY_FACTS_ADVANCER_ENABLED: 1
      HONOR_FACTS_ADVANCER_ENABLED: 1
    volumes:
      # 后端日志统一归档至物理机
      - /opt/docker/backend/logs:/app/logs
    expose:
      # 仅在 proxy 网络内部暴露 8000，拒绝公网直连
      - "8000"
    networks:
      - proxy

  frontend:
    container_name: aiweb-frontend
    build:
      context: ./frontend/ai-web-g1
    image: aiweb-frontend:latest
    restart: always
    depends_on:
      - backend
    env_file:
      - .env
    # ⚠️ 注意：这里删除了 ports: ["8080:80"]，前端不直接对外，所有流量交由 NPM 反代
    networks:
      - proxy

  # ==================================
  # ⭐ 统一网关 Nginx Proxy Manager
  # ==================================
  npm:
    container_name: aiweb-npm
    image: jc21/nginx-proxy-manager:latest
    restart: always
    ports:
      - "80:80"     # HTTP
      - "443:443"   # HTTPS
      - "81:81"     # NPM 管理后台面板
    volumes:
      # 代理面板的数据与证书统一归档至物理机
      - /opt/docker/npm/data:/data
      - /opt/docker/npm/letsencrypt:/etc/letsencrypt
    networks:
      - proxy

networks:
  # 统一通信总线
  proxy:
    name: proxy
    driver: bridge