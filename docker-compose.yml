version: "3.9"

services:
  db:
    container_name: aiweb-db
    image: postgres:14
    restart: always
    environment:
      POSTGRES_DB: aiweb
      POSTGRES_USER: aiweb_user
      POSTGRES_PASSWORD: REDACTED_PASSWORD
    volumes:
      - aiweb_pgdata:/var/lib/postgresql/data
    networks:
      - aiweb-net

  backend:
    container_name: aiweb-backend
    build:
      context: ./backend
    image: aiweb-backend:latest
    restart: always
    depends_on:
      - db
    environment:
      ENV: production
      DEBUG: "false"
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql://aiweb_user:REDACTED_PASSWORD@db:5432/aiweb
      JWT_SECRET: REDACTED_JWT_SECRET
      COMFYUI_BASE_URL: http://100.114.23.111:9000
    expose:
      - "8000"
    networks:
      - aiweb-net

  frontend:
    container_name: aiweb-frontend
    build:
      context: ./frontend/ai-web-g1
    image: aiweb-frontend:latest
    restart: always
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - aiweb-net

volumes:
  aiweb_pgdata:

networks:
  aiweb-net:
    driver: bridge
