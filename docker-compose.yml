version: "3.9"

services:
  db:
    container_name: aiweb-db
    image: postgres:14
    restart: always

    environment:
      POSTGRES_DB: aiweb
      POSTGRES_USER: aiweb_user
      # 密码不再明文写入，由 .env 注入
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - aiweb_pgdata:/var/lib/postgresql/data

    networks:
      - aiweb-net


  backend:
    container_name: aiweb-backend
    build:
      context: ./backend
    image: aiweb-backend:latest
    restart: always

    depends_on:
      - db

    # 所有敏感配置统一从 .env 注入
    env_file:
      - .env

    # 非敏感、结构性配置保留在 compose 中
    environment:
      ENV: production
      DEBUG: "false"
      PYTHONUNBUFFERED: "1"
      COMFYUI_BASE_URL: http://100.114.23.111:9000

    expose:
      - "8000"

    networks:
      - aiweb-net


  frontend:
    container_name: aiweb-frontend
    build:
      context: ./frontend/ai-web-g1
    image: aiweb-frontend:latest
    restart: always

    depends_on:
      - backend

    ports:
      - "8080:80"

    networks:
      - aiweb-net


volumes:
  aiweb_pgdata:


networks:
  aiweb-net:
    driver: bridge
